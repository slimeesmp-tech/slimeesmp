<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlimeeSMP - Rank Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .main-container { max-width: 650px; width: 100%; margin-top: 20px; }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(30, 30, 40, 0.85);
            border: 3px solid #4caf50;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: #81c784;
        }
        .section {
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid #4caf50;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #81c784;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #a5d6a7;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #1a1a2e;
            border: 2px solid #4caf50;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        .rank-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 500px) {
            .rank-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.2rem; }
        }
        .rank-card {
            background: rgba(26,26,46,0.8);
            border: 2px solid #3a3a5a;
            border-radius: 14px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
        }
        .rank-card.selected {
            border-color: #ffd54f !important;
            background: rgba(40,40,20,0.9) !important;
        }
        .rank-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .rank-name { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #81c784; }
        .rank-price { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: #ffd54f; }
        .rank-desc { font-size: 0.75rem; color: #aaa; margin-top: 6px; }
        .buy-button {
            width: 100%;
            padding: 18px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1b5e20;
            transition: all 0.15s ease;
        }
        .buy-button:disabled { background: #555; box-shadow: 0 4px 0 #333; cursor: not-allowed; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #1e1e28;
            border: 3px solid #ffd54f;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .command-highlight {
            display: inline-block;
            background: #0d0d1a;
            color: #81c784;
            padding: 10px 18px;
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            margin: 10px 0;
            word-break: break-all;
        }
        .modal-close-btn {
            margin-top: 18px;
            padding: 12px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            background: #ffd54f;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .hidden { display: none !important; }
        .status-msg { text-align: center; color: #ef5350; min-height: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <span style="font-size:3rem;">🟢</span>
            <h1>SLIMEE SMP</h1>
            <p style="font-family:'Press Start 2P',cursive;font-size:0.55rem;color:#a5d6a7;">RANK SHOP</p>
        </div>

        <div class="section">
            <h2>📋 REGISTRACE</h2>
            <div class="form-group">
                <label for="nickname">🎮 NICKNAME</label>
                <input type="text" id="nickname" placeholder="Tvůj herní nick..." maxlength="16">
            </div>
            <div class="form-group">
                <label for="password">🔒 HESLO</label>
                <input type="password" id="password" placeholder="Heslo pro ověření..." maxlength="32">
            </div>
        </div>

        <div class="section">
            <h2>🏆 VYBER SI RANK</h2>
            <div class="rank-grid" id="rankGrid"></div>
        </div>

        <button class="buy-button" id="buyButton" disabled>💰 KOUPIT RANK</button>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="modal-overlay hidden" id="confirmModal">
        <div class="modal-box">
            <span style="font-size:4rem;">⚠️</span>
            <h3 style="font-family:'Press Start 2P',cursive;color:#ffd54f;">POTVRZENÍ VE HŘE</h3>
            <p>Zadej na serveru <strong>SlimeeSMP</strong> tento příkaz:</p>
            <span class="command-highlight" id="confirmCommand">/store confirm ...</span>
            <p style="font-size:0.7rem;color:#aaa;">Platnost 30 sekund</p>
            <button class="modal-close-btn" id="closeModalBtn">ROZUMÍM 👍</button>
        </div>
    </div>

    <script>
        (function() {
            const ranks = [
                { id: 'slime', name: 'SLIME', emoji: '🟢', price: 5000, desc: 'Základní rank' },
                { id: 'slimer', name: 'SLIMER', emoji: '🟩', price: 15000, desc: 'Lepší výhody' },
                { id: 'slimest', name: 'SLIMEST', emoji: '💚', price: 35000, desc: 'VIP rank' },
                { id: 'slime_lord', name: 'SLIME LORD', emoji: '👑', price: 80000, desc: 'Ultimátní rank' }
            ];

            const nicknameInput = document.getElementById('nickname');
            const passwordInput = document.getElementById('password');
            const rankGrid = document.getElementById('rankGrid');
            const buyButton = document.getElementById('buyButton');
            const statusMsg = document.getElementById('statusMsg');
            const confirmModal = document.getElementById('confirmModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const confirmCommand = document.getElementById('confirmCommand');

            let selectedRank = null;

            ranks.forEach(rank => {
                const card = document.createElement('div');
                card.className = 'rank-card';
                card.innerHTML = `
                    <span class="rank-emoji">${rank.emoji}</span>
                    <div class="rank-name">${rank.name}</div>
                    <div class="rank-price">💰 ${rank.price.toLocaleString('cs-CZ')} $</div>
                    <div class="rank-desc">${rank.desc}</div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.rank-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedRank = rank;
                    updateBuyButton();
                    statusMsg.textContent = '';
                });
                rankGrid.appendChild(card);
            });

            function updateBuyButton() {
                const nick = nicknameInput.value.trim();
                const pass = passwordInput.value.trim();
                if (nick.length >= 2 && pass.length >= 3 && selectedRank) {
                    buyButton.disabled = false;
                    buyButton.textContent = `💰 KOUPIT ${selectedRank.name} ZA ${selectedRank.price.toLocaleString('cs-CZ')} $`;
                } else {
                    buyButton.disabled = true;
                    buyButton.textContent = '💰 KOUPIT RANK';
                }
            }

            nicknameInput.addEventListener('input', () => {
                nicknameInput.value = nicknameInput.value.replace(/[^a-zA-Z0-9_]/g, '').slice(0,16);
                updateBuyButton();
            });
            passwordInput.addEventListener('input', updateBuyButton);

            buyButton.addEventListener('click', async () => {
                if (!selectedRank) return;
                const nick = nicknameInput.value.trim();
                const pass = passwordInput.value.trim();

                buyButton.disabled = true;
                buyButton.textContent = '⏳ ODESÍLÁM...';

                try {
                    // ✅ Tvoje Railway adresa
                    const response = await fetch('https://smp-backend-production-256d.up.railway.app/api/create-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nickname: nick, password: pass, rankId: selectedRank.id, price: selectedRank.price })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    confirmCommand.textContent = `/store confirm ${data.token}`;
                    confirmModal.classList.remove('hidden');
                } catch (err) {
                    statusMsg.textContent = '❌ CHYBA: ' + err.message;
                } finally {
                    buyButton.disabled = false;
                    updateBuyButton();
                }
            });

            closeModalBtn.addEventListener('click', () => {
                confirmModal.classList.add('hidden');
                statusMsg.textContent = '⌛ ČEKÁ SE NA POTVRZENÍ VE HŘE...';
            });
            confirmModal.addEventListener('click', (e) => {
                if (e.target === confirmModal) {
                    confirmModal.classList.add('hidden');
                    statusMsg.textContent = '⌛ ČEKÁ SE NA POTVRZENÍ VE HŘE...';
                }
            });

            updateBuyButton();
        })();
    </script>
</body>
</html>
